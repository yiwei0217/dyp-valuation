<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 价值投资估值助手</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .admin-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
        }
        .admin-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .admin-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .admin-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        .admin-input:focus {
            border-color: #1B4F8C;
        }
        .admin-btn {
            padding: 12px 20px;
            background: #1B4F8C;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .admin-btn:active {
            opacity: 0.9;
        }
        .admin-btn-danger {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .admin-table th {
            text-align: left;
            padding: 10px 8px;
            color: #666;
            font-weight: 500;
            border-bottom: 1px solid #eee;
        }
        .admin-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #f5f5f5;
            color: #333;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-used {
            background: #ffebee;
            color: #c62828;
        }
        .status-unused {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }
        .admin-link {
            display: inline-block;
            margin-top: 16px;
            color: #1B4F8C;
            text-decoration: none;
            font-size: 14px;
        }
        .logout-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logout-bar button {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div id="admin-login">
            <div class="admin-title">管理后台</div>
            <div class="admin-subtitle">价值投资估值助手 · 邀请码与用户管理</div>

            <div class="admin-card">
                <div class="admin-card-title">管理员登录</div>
                <div class="input-group" style="margin-bottom: 14px;">
                    <label class="input-label">用户名</label>
                    <input type="text" id="admin-username" class="text-input" placeholder="admin" value="admin">
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label class="input-label">密码</label>
                    <input type="password" id="admin-password" class="text-input" placeholder="请输入管理员密码">
                </div>
                <button class="btn-primary" onclick="adminLogin()" style="width: 100%;">登 录</button>
                <a href="index.html" class="admin-link">← 返回应用</a>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="logout-bar">
                <div>
                    <div class="admin-title">管理后台</div>
                    <div class="admin-subtitle">已登录：<span id="admin-name">admin</span></div>
                </div>
                <button onclick="adminLogout()">退出</button>
            </div>

            <div class="admin-card">
                <div class="admin-card-title">修改管理员密码</div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <label class="input-label">原密码</label>
                    <input type="password" id="admin-old-password" class="text-input" placeholder="请输入当前密码">
                </div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <label class="input-label">新密码</label>
                    <input type="password" id="admin-new-password" class="text-input" placeholder="请输入新密码">
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label class="input-label">确认新密码</label>
                    <input type="password" id="admin-new-password2" class="text-input" placeholder="请再次输入新密码">
                </div>
                <button class="btn-primary" onclick="changeAdminPassword()" style="width: 100%;">保存新密码</button>
            </div>

            <div class="admin-card">
                <div class="admin-card-title">
                    邀请码管理
                    <span id="invite-count" style="font-size: 13px; color: #888; font-weight: 400;"></span>
                </div>
                <div class="admin-input-group">
                    <input type="text" id="new-invite-code" class="admin-input" placeholder="输入新邀请码（如 VALUE2）" maxlength="10">
                    <button class="admin-btn" onclick="createInviteCode()">新增</button>
                </div>
                <div id="invite-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-title">
                    注册用户
                    <span id="user-count" style="font-size: 13px; color: #888; font-weight: 400;"></span>
                </div>
                <div id="user-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="supabase.min.js" onerror="console.warn('supabase.min.js 加载失败，将使用 fetch 备用')"></script>
    <script>
        const SUPABASE_URL = 'https://sgdcztoirqpuitjwdrzl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZGN6dG9pcnFwdWl0andkcnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NTk4MzAsImV4cCI6MjA5OTEzNTgzMH0.8Ju0fe3iFGkP80Wqqx3QNhQWujQ8xr-Ai1LJHo2JYQM';

        var supabase = null;
        var supabaseReady = false;
        var ADMIN_KEY = 'valuation_admin_session';

        // 轻量级 Supabase RPC 备用：直接用 fetch，不依赖外部库
        function createRpcClient() {
            return {
                rpc: function(functionName, params) {
                    return fetch(SUPABASE_URL + '/rest/v1/rpc/' + functionName, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(params || {})
                    }).then(function(response) {
                        return response.text().then(function(text) {
                            var data = null;
                            if (text) {
                                try { data = JSON.parse(text); } catch (e) { data = text; }
                            }
                            if (!response.ok) {
                                var message = (data && data.message) ? data.message : ('请求失败 ' + response.status);
                                return { data: null, error: { message: message } };
                            }
                            return { data: data, error: null };
                        });
                    }).catch(function(err) {
                        return { data: null, error: { message: err.message || '网络错误' } };
                    });
                }
            };
        }

        // ====== SHA-256 ======
        async function sha256(text) {
            if (!text) return '';
            var encoder = new TextEncoder();
            var data = encoder.encode(text);
            var hashBuffer = await crypto.subtle.digest('SHA-256', data);
            var hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
        }

        // ====== Toast ======
        function showToast(message, duration) {
            duration = duration || 2000;
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(function() {
                toast.classList.add('hidden');
            }, duration);
        }

        // ====== 显示/隐藏屏幕 ======
        function showScreen(id) {
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        // ====== 管理员登录 ======
        async function adminLogin() {
            if (!supabaseReady || !supabase) {
                showToast('系统初始化中，请稍后再试');
                return;
            }
            var username = document.getElementById('admin-username').value.trim();
            var password = document.getElementById('admin-password').value.trim();
            if (!username || !password) {
                showToast('请输入用户名和密码');
                return;
            }
            showToast('登录中...', 10000);
            try {
                var passwordHash = await sha256(password);
                var result = await supabase.rpc('admin_login', {
                    p_username: username,
                    p_password_hash: passwordHash
                });
                if (result.error) throw result.error;
                if (result.data === true) {
                    localStorage.setItem(ADMIN_KEY, JSON.stringify({
                        username: username,
                        passwordHash: passwordHash
                    }));
                    document.getElementById('admin-name').textContent = username;
                    showScreen('admin-panel');
                    loadData();
                } else {
                    showToast('用户名或密码错误');
                }
            } catch (err) {
                console.error('Login error:', err);
                showToast('登录失败：' + (err.message || '网络错误'));
            }
        }

        function adminLogout() {
            localStorage.removeItem(ADMIN_KEY);
            showScreen('admin-login');
            document.getElementById('admin-password').value = '';
        }

        // ====== 修改管理员密码 ======
        async function changeAdminPassword() {
            if (!supabaseReady || !supabase) {
                showToast('系统初始化中，请稍后再试');
                return;
            }
            var oldPwd = document.getElementById('admin-old-password').value.trim();
            var newPwd = document.getElementById('admin-new-password').value.trim();
            var newPwd2 = document.getElementById('admin-new-password2').value.trim();
            if (!oldPwd || !newPwd || !newPwd2) {
                showToast('请填写完整密码信息');
                return;
            }
            if (newPwd !== newPwd2) {
                showToast('两次输入的新密码不一致');
                return;
            }
            if (newPwd.length < 6) {
                showToast('新密码至少6位');
                return;
            }
            showToast('保存中...', 10000);
            try {
                var oldHash = await sha256(oldPwd);
                var newHash = await sha256(newPwd);
                var result = await supabase.rpc('change_admin_password', {
                    p_old_password_hash: oldHash,
                    p_new_password_hash: newHash
                });
                if (result.error) throw result.error;
                if (result.data === true) {
                    showToast('密码修改成功，请重新登录');
                    // 更新本地会话
                    var session = localStorage.getItem(ADMIN_KEY);
                    if (session) {
                        var parsed = JSON.parse(session);
                        parsed.passwordHash = newHash;
                        localStorage.setItem(ADMIN_KEY, JSON.stringify(parsed));
                    }
                    // 清空输入框
                    document.getElementById('admin-old-password').value = '';
                    document.getElementById('admin-new-password').value = '';
                    document.getElementById('admin-new-password2').value = '';
                    setTimeout(adminLogout, 1500);
                } else {
                    showToast('原密码错误');
                }
            } catch (err) {
                console.error('Change password error:', err);
                showToast('修改失败：' + (err.message || '网络错误'));
            }
        }

        // ====== 加载数据 ======
        async function loadData() {
            await loadInviteCodes();
            await loadUsers();
        }

        async function loadInviteCodes() {
            try {
                var result = await supabase.rpc('get_invite_codes');
                if (result.error) throw result.error;
                var data = result.data;
                var container = document.getElementById('invite-list');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无邀请码</div>';
                    document.getElementById('invite-count').textContent = '共 0 个';
                    return;
                }
                var usedCount = data.filter(function(c) { return c.is_used; }).length;
                document.getElementById('invite-count').textContent = '共 ' + data.length + ' 个，已用 ' + usedCount + ' 个';
                var html = '<table class="admin-table"><thead><tr>';
                html += '<th>邀请码</th><th>状态</th><th>使用者</th><th>使用时间</th><th>操作</th>';
                html += '</tr></thead><tbody>';
                for (var i = 0; i < data.length; i++) {
                    var c = data[i];
                    html += '<tr>';
                    html += '<td><strong>' + c.code + '</strong></td>';
                    html += '<td><span class="status-badge ' + (c.is_used ? 'status-used' : 'status-unused') + '">' + (c.is_used ? '已使用' : '未使用') + '</span></td>';
                    html += '<td>' + (c.used_by || '-') + '</td>';
                    html += '<td>' + (c.used_at ? new Date(c.used_at).toLocaleString('zh-CN') : '-') + '</td>';
                    html += '<td><button class="admin-btn admin-btn-danger" onclick="deleteInviteCode(\'' + c.code + '\')">删除</button></td>';
                    html += '</tr>';
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('invite-list').innerHTML = '<div class="empty-state">加载失败：' + err.message + '</div>';
            }
        }

        async function loadUsers() {
            try {
                var result = await supabase.rpc('get_users');
                if (result.error) throw result.error;
                var data = result.data;
                var container = document.getElementById('user-list');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无注册用户</div>';
                    document.getElementById('user-count').textContent = '共 0 人';
                    return;
                }
                document.getElementById('user-count').textContent = '共 ' + data.length + ' 人';
                var html = '<table class="admin-table"><thead><tr>';
                html += '<th>用户名</th><th>邀请码</th><th>注册时间</th><th>密码</th><th>操作</th>';
                html += '</tr></thead><tbody>';
                for (var i = 0; i < data.length; i++) {
                    var u = data[i];
                    var pwdDisplay = u.password_hash ? u.password_hash.substring(0, 8) + '...' : '-';
                    html += '<tr>';
                    html += '<td>' + u.username + '</td>';
                    html += '<td>' + u.invite_code + '</td>';
                    html += '<td>' + (u.created_at ? new Date(u.created_at).toLocaleString('zh-CN') : '-') + '</td>';
                    html += '<td><span style="font-size:12px;color:#999;font-family:monospace;" title="SHA-256加密存储，不可逆">' + pwdDisplay + '</span></td>';
                    html += '<td><button class="admin-btn admin-btn-danger" onclick="resetUserPassword(\'' + u.username + '\')">重置密码</button></td>';
                    html += '</tr>';
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('user-list').innerHTML = '<div class="empty-state">加载失败：' + err.message + '</div>';
            }
        }

        async function resetUserPassword(username) {
            var newPwd = prompt('为用户「' + username + '」设置新密码（至少6位）：');
            if (!newPwd) return;
            if (newPwd.length < 6) {
                showToast('新密码至少6位');
                return;
            }
            showToast('重置中...', 10000);
            try {
                var newHash = await sha256(newPwd);
                var result = await supabase.rpc('admin_reset_user_password', {
                    p_username: username,
                    p_new_password_hash: newHash
                });
                if (result.error) throw result.error;
                if (result.data === true) {
                    showToast('密码已重置，请将新密码告知用户');
                } else {
                    showToast('用户不存在');
                }
            } catch (err) {
                console.error('Reset password error:', err);
                showToast('重置失败：' + (err.message || '网络错误'));
            }
        }

        async function createInviteCode() {
            var input = document.getElementById('new-invite-code');
            var code = input.value.trim();
            if (!code) { showToast('请输入邀请码'); return; }
            if (code.length < 4) { showToast('邀请码至少4位'); return; }
            try {
                var result = await supabase.rpc('create_invite_code', { p_code: code });
                if (result.error) throw result.error;
                if (result.data === true) {
                    showToast('邀请码创建成功');
                    input.value = '';
                    await loadInviteCodes();
                } else {
                    showToast('邀请码已存在');
                }
            } catch (err) {
                console.error(err);
                showToast('创建失败：' + (err.message || '网络错误'));
            }
        }

        async function deleteInviteCode(code) {
            if (!confirm('确定要删除邀请码 ' + code + ' 吗？')) return;
            try {
                var result = await supabase.rpc('delete_invite_code', { p_code: code });
                if (result.error) throw result.error;
                showToast('删除成功');
                await loadInviteCodes();
            } catch (err) {
                console.error(err);
                showToast('删除失败：' + (err.message || '网络错误'));
            }
        }

        // ====== 统一初始化（仅一个 DOMContentLoaded） ======
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Admin: DOM ready, initializing...');

            // 1) 初始化 Supabase（优先用本地库，失败则使用 fetch 备用）
            if (window.supabase && window.supabase.createClient) {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    supabaseReady = true;
                    console.log('Admin: using local supabase.min.js');
                } catch (e) {
                    console.warn('Admin: local supabase init failed, using fetch fallback', e);
                    supabase = createRpcClient();
                    supabaseReady = true;
                }
            } else {
                console.warn('Admin: supabase.min.js not loaded, using fetch fallback');
                supabase = createRpcClient();
                supabaseReady = true;
            }

            // 2) 绑定 Enter 键
            var pwdInput = document.getElementById('admin-password');
            if (pwdInput) {
                pwdInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') adminLogin();
                });
            }
            var codeInput = document.getElementById('new-invite-code');
            if (codeInput) {
                codeInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') createInviteCode();
                });
            }
            var confirmPwdInput = document.getElementById('admin-new-password2');
            if (confirmPwdInput) {
                confirmPwdInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') changeAdminPassword();
                });
            }

            // 3) 尝试自动登录
            var session = localStorage.getItem(ADMIN_KEY);
            if (session) {
                try {
                    var parsed = JSON.parse(session);
                    if (parsed && parsed.username && parsed.passwordHash) {
                        console.log('Admin: trying auto-login...');
                        supabase.rpc('admin_login', {
                            p_username: parsed.username,
                            p_password_hash: parsed.passwordHash
                        }).then(function(result) {
                            if (result.error) throw result.error;
                            if (result.data === true) {
                                console.log('Admin: auto-login success');
                                document.getElementById('admin-name').textContent = parsed.username;
                                showScreen('admin-panel');
                                loadData();
                            } else {
                                localStorage.removeItem(ADMIN_KEY);
                                showScreen('admin-login');
                            }
                        }).catch(function(e) {
                            console.warn('Admin: auto-login failed', e);
                            localStorage.removeItem(ADMIN_KEY);
                            showScreen('admin-login');
                        });
                    } else {
                        showScreen('admin-login');
                    }
                } catch (e) {
                    localStorage.removeItem(ADMIN_KEY);
                    showScreen('admin-login');
                }
            } else {
                showScreen('admin-login');
            }

            console.log('Admin: init complete, ready for login');
        });
    </script>
</body>
</html>
